<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Face Mask Detector</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom Animations */
        @keyframes scan {
            0% { top: 0%; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }
        .scanner-line {
            position: absolute;
            left: 0;
            width: 100%;
            height: 3px;
            background: #3b82f6; /* Tailwind Blue 500 */
            box-shadow: 0 0 15px 2px #3b82f6;
            animation: scan 1.5s infinite linear;
            display: none; /* Hidden by default */
        }
        .scanner-active .scanner-line {
            display: block;
        }
        
        /* Smooth UI Fade */
        .fade-in {
            animation: fadeInSlide 0.5s ease-out forwards;
        }
        @keyframes fadeInSlide {
            0% { opacity: 0; transform: translateY(15px); }
            100% { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen font-sans text-gray-800 transition-colors duration-500" id="bodyBg">

    <div class="max-w-3xl mx-auto py-12 px-4 sm:px-6 lg:px-8 fade-in">
        <div class="text-center mb-10">
            <h1 class="text-4xl font-extrabold text-blue-600 tracking-tight">AI Face Mask Detector</h1>
            <p class="mt-3 text-lg text-gray-500">Real-time deep learning analysis.</p>
        </div>

        <div class="bg-white shadow-2xl rounded-2xl p-8 mb-8 border border-gray-100 relative overflow-hidden transition-all duration-300">
            
            <div class="flex justify-center space-x-4 mb-6 relative z-10">
                <button id="btnUploadMode" class="px-6 py-2 rounded-full font-bold bg-blue-100 text-blue-700 transition-all duration-300 hover:scale-105">Upload Image</button>
                <button id="btnCameraMode" class="px-6 py-2 rounded-full font-bold bg-gray-100 text-gray-600 hover:bg-blue-50 transition-all duration-300 hover:scale-105">Live Camera</button>
            </div>

            <div id="uploadSection" class="fade-in">
                <form id="uploadForm">
                    <div class="flex items-center justify-center w-full">
                        <label for="file-upload" class="flex flex-col items-center justify-center w-full h-64 border-2 border-dashed rounded-xl cursor-pointer bg-gray-50 border-gray-300 hover:bg-blue-50 hover:border-blue-400 transition-all duration-300 group">
                            <div class="flex flex-col items-center justify-center pt-5 pb-6 transform group-hover:-translate-y-1 transition-transform duration-300">
                                <svg class="w-10 h-10 mb-3 text-gray-400 group-hover:text-blue-500 transition-colors duration-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path></svg>
                                <p class="mb-2 text-sm text-gray-500"><span class="font-semibold text-blue-600">Click to upload</span> or drag and drop</p>
                            </div>
                            <input id="file-upload" type="file" class="hidden" accept="image/*" />
                        </label>
                    </div>
                </form>
                
                <div id="previewContainer" class="hidden mt-6 flex flex-col items-center fade-in">
                    <div id="imageWrapper" class="relative rounded-lg overflow-hidden shadow-md mb-4 inline-block">
                        <img id="imagePreview" class="max-h-64 object-cover" src="" alt="Preview">
                        <div class="scanner-line"></div>
                    </div>
                    
                    <button id="predictUploadBtn" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-8 rounded-full shadow-lg transition-all duration-300 transform hover:scale-105 focus:ring-4 focus:ring-blue-300">
                        Analyze Image
                    </button>
                </div>
            </div>

            <div id="cameraSection" class="hidden flex-col items-center fade-in">
                <div id="videoWrapper" class="relative w-full max-w-md bg-black rounded-xl overflow-hidden shadow-2xl mb-6 flex justify-center items-center ring-4 ring-gray-100" style="height: 300px;">
                    <video id="webcamVideo" autoplay playsinline class="w-full h-full object-cover transform scale-x-[-1]"></video> <div class="scanner-line"></div>
                    <canvas id="snapshotCanvas" class="hidden"></canvas>
                </div>
                
                <div class="flex space-x-4">
                    <button id="startCameraBtn" class="bg-green-500 hover:bg-green-600 text-white font-bold py-3 px-8 rounded-full shadow-lg transition-all duration-300 transform hover:scale-105">
                        Start Camera
                    </button>
                    <button id="captureAnalyzeBtn" class="hidden bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-8 rounded-full shadow-lg transition-all duration-300 transform hover:scale-105">
                        📸 Capture & Analyze
                    </button>
                </div>
            </div>
        </div>

        <div id="loading" class="hidden text-center my-8 fade-in">
            <div class="inline-block animate-spin rounded-full h-10 w-10 border-4 border-gray-200 border-t-blue-600 shadow-sm"></div>
            <p class="mt-3 text-blue-600 font-semibold animate-pulse tracking-wide">AI is analyzing...</p>
        </div>

        <div id="resultCard" class="hidden bg-white shadow-2xl rounded-2xl p-8 text-center border border-gray-100 fade-in">
            <h2 class="text-2xl font-bold mb-2 text-gray-700">Analysis Result</h2>
            <div id="resultBadge" class="inline-block px-8 py-3 rounded-full text-xl font-bold my-4 transition-all duration-500 transform scale-110 shadow-md"></div>
            <p class="text-gray-500 text-lg mt-2">AI Confidence: <span id="confidenceText" class="font-extrabold text-gray-900"></span>%</p>
        </div>
    </div>

    <script>
        // DOM Elements
        const bodyBg = document.getElementById('bodyBg');
        const btnUploadMode = document.getElementById('btnUploadMode');
        const btnCameraMode = document.getElementById('btnCameraMode');
        const uploadSection = document.getElementById('uploadSection');
        const cameraSection = document.getElementById('cameraSection');
        
        const fileInput = document.getElementById('file-upload');
        const previewContainer = document.getElementById('previewContainer');
        const imagePreview = document.getElementById('imagePreview');
        const imageWrapper = document.getElementById('imageWrapper');
        const predictUploadBtn = document.getElementById('predictUploadBtn');
        
        const webcamVideo = document.getElementById('webcamVideo');
        const videoWrapper = document.getElementById('videoWrapper');
        const snapshotCanvas = document.getElementById('snapshotCanvas');
        const startCameraBtn = document.getElementById('startCameraBtn');
        const captureAnalyzeBtn = document.getElementById('captureAnalyzeBtn');
        
        const loading = document.getElementById('loading');
        const resultCard = document.getElementById('resultCard');
        const resultBadge = document.getElementById('resultBadge');
        const confidenceText = document.getElementById('confidenceText');

        let selectedFile = null;
        let stream = null;

        // --- UI TOGGLES ---
        function resetUI() {
            resultCard.classList.add('hidden');
            bodyBg.className = "bg-gray-50 min-h-screen font-sans text-gray-800 transition-colors duration-1000";
        }

        btnUploadMode.addEventListener('click', () => {
            uploadSection.classList.remove('hidden');
            cameraSection.classList.add('hidden');
            cameraSection.classList.remove('flex');
            btnUploadMode.className = "px-6 py-2 rounded-full font-bold bg-blue-100 text-blue-700 transition-all duration-300 hover:scale-105 shadow-sm";
            btnCameraMode.className = "px-6 py-2 rounded-full font-bold bg-gray-100 text-gray-600 hover:bg-blue-50 transition-all duration-300 hover:scale-105";
            stopCamera();
            resetUI();
        });

        btnCameraMode.addEventListener('click', () => {
            cameraSection.classList.remove('hidden');
            cameraSection.classList.add('flex');
            uploadSection.classList.add('hidden');
            btnCameraMode.className = "px-6 py-2 rounded-full font-bold bg-blue-100 text-blue-700 transition-all duration-300 hover:scale-105 shadow-sm";
            btnUploadMode.className = "px-6 py-2 rounded-full font-bold bg-gray-100 text-gray-600 hover:bg-blue-50 transition-all duration-300 hover:scale-105";
            resetUI();
        });

        // --- API CALL LOGIC ---
        async function sendImageToAPI(fileOrBlob, wrapperElement) {
            // Start Animations
            loading.classList.remove('hidden');
            resultCard.classList.add('hidden');
            wrapperElement.classList.add('scanner-active'); // Turn on Laser
            
            const formData = new FormData();
            formData.append('file', fileOrBlob, 'image.jpg');

            try {
                const response = await fetch('/predict', { method: 'POST', body: formData });
                const data = await response.json();

                if (data.status === "success") {
                    confidenceText.textContent = data.confidence;
                    
                    // Animate background and badge based on result
                    if (data.prediction === "With Mask") {
                        resultBadge.innerHTML = "🛡️ Wearing Mask";
                        resultBadge.className = "inline-block px-8 py-3 rounded-full text-xl font-bold my-4 bg-green-100 text-green-700 ring-4 ring-green-50 transform hover:scale-105 transition-transform";
                        bodyBg.classList.add('bg-green-50');
                        bodyBg.classList.remove('bg-gray-50', 'bg-red-50');
                    } else {
                        resultBadge.innerHTML = "🚨 No Mask Detected";
                        resultBadge.className = "inline-block px-8 py-3 rounded-full text-xl font-bold my-4 bg-red-100 text-red-700 ring-4 ring-red-50 transform hover:scale-105 transition-transform animate-pulse";
                        bodyBg.classList.add('bg-red-50');
                        bodyBg.classList.remove('bg-gray-50', 'bg-green-50');
                    }
                    resultCard.classList.remove('hidden');
                } else {
                    alert("Error: " + data.error);
                }
            } catch (error) {
                console.error(error);
                alert("Failed to analyze image.");
            } finally {
                // Stop Animations
                loading.classList.add('hidden');
                wrapperElement.classList.remove('scanner-active'); // Turn off Laser
            }
        }

        // --- UPLOAD LOGIC ---
        fileInput.addEventListener('change', (e) => {
            selectedFile = e.target.files[0];
            if (selectedFile) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    imagePreview.src = event.target.result;
                    previewContainer.classList.remove('hidden');
                    resetUI();
                }
                reader.readAsDataURL(selectedFile);
            }
        });

        predictUploadBtn.addEventListener('click', () => {
            if (selectedFile) sendImageToAPI(selectedFile, imageWrapper);
        });

        // --- WEBCAM LOGIC ---
        startCameraBtn.addEventListener('click', async () => {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ video: true });
                webcamVideo.srcObject = stream;
                startCameraBtn.classList.add('hidden');
                captureAnalyzeBtn.classList.remove('hidden');
            } catch (err) {
                alert("Could not access the camera. Please ensure permissions are granted.");
                console.error(err);
            }
        });

        function stopCamera() {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
                webcamVideo.srcObject = null;
                startCameraBtn.classList.remove('hidden');
                captureAnalyzeBtn.classList.add('hidden');
            }
        }

        captureAnalyzeBtn.addEventListener('click', () => {
            if (!stream) return;
            resetUI();
            
            snapshotCanvas.width = webcamVideo.videoWidth;
            snapshotCanvas.height = webcamVideo.videoHeight;
            
            const context = snapshotCanvas.getContext('2d');
            // Since we flipped the video via CSS, we should flip the canvas context before drawing
            // so the AI gets exactly what the user sees
            context.translate(snapshotCanvas.width, 0);
            context.scale(-1, 1);
            context.drawImage(webcamVideo, 0, 0, snapshotCanvas.width, snapshotCanvas.height);
            
            snapshotCanvas.toBlob((blob) => {
                sendImageToAPI(blob, videoWrapper);
            }, 'image/jpeg', 0.9);
        });
    </script>
</body>
</html>
